name: Telegram Export (public only)

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run Telegram export
        run: python telegram_export_public.py

      - name: Commit updated export if changed
        run: |
          git config user.name "lours-rp-actions"
          git config user.email "actions@users.noreply.github.com"
          git add lours_export.json
          git diff --staged --quiet || git commit -m "Auto-update lours_export.json [skip ci]"
          git push
